name: Build IndexMaster EXE

on:
  push:
    tags:
      - 'v*' # هيشتغل لما تعمل Tag للنسخة زي v1.0.0
  workflow_dispatch: # بيسمح لك تشغله يدوي بضغطة زرار من GitHub Actions

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- الجزء الجديد: حفظ البرنامج في الـ Artifacts دائماً ---
      - name: Upload EXE as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IndexMaster-App
          path: dist_electron/*.exe

      # --- الجزء القديم: حفظ البرنامج في الـ Releases لو عملت Tag ---
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist_electron/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
